services:
  - type: web
    name: spendsmart-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendsmart-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://your-vercel-url.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: spendsmart-db
    databaseName: spendsmartdb
    user: spendsmartuser
    plan: free
